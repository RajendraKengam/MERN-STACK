<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Collage Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .collage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .collage-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #ddd;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .collage-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }

        .collage-item.large {
            grid-column: span 2;
            grid-row: span 2;
        }

        .collage-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .collage-item:hover img {
            transform: scale(1.1);
        }

        .collage-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .collage-item:hover .collage-item-overlay {
            opacity: 1;
        }

        .collage-item-text {
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
        }

        .section-title {
            font-size: 2.5em;
            margin-bottom: 40px;
            text-align: center;
            color: #667eea;
            font-weight: 700;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }

        footer p {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .collage-item.large {
                grid-column: span 1;
                grid-row: span 1;
            }

            .collage-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>✨ Collage Gallery</h1>
        <p>A beautiful collection of moments</p>
    </header>

    <div class="container">
        <h2 class="section-title">Featured Collection</h2>

        <div class="collage-grid">
            <!-- Sample items - replace with your images -->
            <div class="collage-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 1</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 2</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 3</div>
                </div>
            </div>

            <div class="collage-item large" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Featured</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 4</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 5</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 6</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #2e2e78 0%, #662d91 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 7</div>
                </div>
            </div>

            <div class="collage-item" style="background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);">
                <div class="collage-item-overlay">
                    <div class="collage-item-text">Item 8</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Collage Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
