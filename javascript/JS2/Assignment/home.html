<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="welcomeMessage">Welcome!</h2>
        <p>You have successfully logged in to your dashboard.</p>
        <button id="logoutBtn" style="background-color: #dc3545;">Logout</button>
    </div>

    <script>
        // Bonus: Restrict direct Home Page access
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display Welcome Username
        const storedUser = localStorage.getItem('username');
        document.getElementById('welcomeMessage').innerText = `Welcome, ${storedUser}`;

        // Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('isLoggedIn'); // Remove the session flag
            alert('Logged out successfully');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
