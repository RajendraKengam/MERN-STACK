<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter 10-digit phone number" maxlength="10" pattern="[6-9]\d{9}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password (min 6 chars)" minlength="6" required>
            </div>
            <button type="submit">Register</button>
            <a href="login.html" class="link">Already have an account? Login</a>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent form from submitting normally
            
            const user = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value.trim();

            // Validation: No empty fields
            if (!user || !email || !phone || !pass) {
                alert('All fields are required!');
                return;
            }

            // Strict Validation using Regex to ensure correct data matches the respective labels
            const namePattern = /^[a-zA-Z0-9]+$/; // Alphanumeric only (no special chars/spaces)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Must look like an email
            const phonePattern = /^[6-9]\d{9}$/; // Must be exactly 10 digits and start with 6-9

            if (!namePattern.test(user)) {
                alert('Username can only contain letters and numbers without spaces!');
                return;
            }
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email format!');
                return;
            }
            if (!phonePattern.test(phone)) {
                alert('Phone number must be exactly 10 digits and start with 6, 7, 8, or 9!');
                return;
            }
            if (pass.length < 6) {
                alert('Password must be at least 6 characters long!');
                return;
            }

            // Store in LocalStorage
            localStorage.setItem('username', user);
            localStorage.setItem('password', pass);
            
            alert('Registration Successful');
            window.location.href = 'login.html'; // Redirect to login
        });
    </script>
</body>
</html>
