    <script>
        let obj={

        console.log(Object.keys(obj));

        obj.name="Rajendra Kengam";

        obj.course="B.tech";

        obj.branch="CSE";

        obj.rolenumber="579";

        Object.freeze(obj);

        obj.rolenumber="580";
