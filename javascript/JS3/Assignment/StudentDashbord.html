<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Table</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        .btn {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
            margin: 0 4px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-edit { background-color: #3498db; }
        .btn-delete { background-color: #e74c3c; }
        
        /* Background classes based on percentage */
        .bg-green { background-color: #84c99b; }   /* 85–100% */
        .bg-yellow { background-color: #fada5e; }  /* 65–84% */
        .bg-orange { background-color: #ffb067; }  /* 55–64% */
        .bg-red { background-color: #e4939b; }     /* <=54% */
        
        /* Search Form Styles */
        .search-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        .search-container input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h2>Student Dashboard</h2>

    <!-- Search Section -->
    <div class="search-container">
        <h3>Filter Students</h3>
        <input type="text" id="filterInput" placeholder="Search by Name or Roll No..." onkeyup="filterTable()">
    </div>

    <h2 style="margin-top: 40px;">All Students Data</h2>
    <table id="resultTable">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Roll No</th>
                <th>CNN</th>
                <th>CPP</th>
                <th>ADE</th>
                <th>DSA</th>
                <th>Total Marks</th>
                <th>Percentage</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Rows will be populated here via JavaScript -->
        </tbody>
    </table>

    <script>
        // Array storing 21 student records
        let students = [
            { name: 'Oliver', rollNo: 'CS202601', marks: { CNN: 62, CPP: 45, ADE: 78, DSA: 54 } },
            { name: 'Emma', rollNo: 'CS202602', marks: { CNN: 91, CPP: 84, ADE: 76, DSA: 89 } },
            { name: 'Liam', rollNo: 'CS202603', marks: { CNN: 55, CPP: 62, ADE: 59, DSA: 71 } },
            { name: 'Ava', rollNo: 'CS202604', marks: { CNN: 78, CPP: 81, ADE: 85, DSA: 77 } },
            { name: 'Noah', rollNo: 'CS202605', marks: { CNN: 43, CPP: 52, ADE: 47, DSA: 60 } },
            { name: 'Isabella', rollNo: 'CS202606', marks: { CNN: 88, CPP: 95, ADE: 92, DSA: 84 } },
            { name: 'Mason', rollNo: 'CS202607', marks: { CNN: 65, CPP: 58, ADE: 70, DSA: 66 } },
            { name: 'Sophia', rollNo: 'CS202608', marks: { CNN: 94, CPP: 89, ADE: 97, DSA: 91 } },
            { name: 'Lucas', rollNo: 'CS202609', marks: { CNN: 51, CPP: 48, ADE: 55, DSA: 50 } },
            { name: 'Mia', rollNo: 'CS202610', marks: { CNN: 82, CPP: 79, ADE: 86, DSA: 88 } },
            { name: 'Ethan', rollNo: 'CS202611', marks: { CNN: 38, CPP: 42, ADE: 45, DSA: 40 } },
            { name: 'Amelia', rollNo: 'CS202612', marks: { CNN: 74, CPP: 68, ADE: 72, DSA: 79 } },
            { name: 'Alexander', rollNo: 'CS202613', marks: { CNN: 97, CPP: 92, ADE: 90, DSA: 96 } },
            { name: 'Harper', rollNo: 'CS202614', marks: { CNN: 61, CPP: 59, ADE: 64, DSA: 68 } },
            { name: 'James', rollNo: 'CS202615', marks: { CNN: 49, CPP: 55, ADE: 51, DSA: 60 } },
            { name: 'Evelyn', rollNo: 'CS202616', marks: { CNN: 85, CPP: 88, ADE: 82, DSA: 87 } },
            { name: 'Benjamin', rollNo: 'CS202617', marks: { CNN: 70, CPP: 75, ADE: 68, DSA: 72 } },
            { name: 'Abigail', rollNo: 'CS202618', marks: { CNN: 58, CPP: 61, ADE: 54, DSA: 65 } },
            { name: 'Elijah', rollNo: 'CS202619', marks: { CNN: 90, CPP: 86, ADE: 94, DSA: 92 } },
            { name: 'Ella', rollNo: 'CS202620', marks: { CNN: 77, CPP: 80, ADE: 79, DSA: 83 } },
            { name: 'William', rollNo: 'CS202621', marks: { CNN: 66, CPP: 71, ADE: 63, DSA: 69 } }
        ];

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // Clear existing rows

            // Sort students in alphabetical order
            students.sort((a, b) => {
                return a.name.localeCompare(b.name);
            });

            students.forEach((student, index) => {
                // Calculate Total & Percentage
                const total = student.marks.CNN + student.marks.CPP + student.marks.ADE + student.marks.DSA;
                const percentage = (total / 400) * 100;

                // Determine Row Background Color & Grade
                let bgClass = '';
                let grade = '';
                if (percentage >= 85) {
                    bgClass = 'bg-green';
                    grade = 'A';
                } else if (percentage >= 65) {
                    bgClass = 'bg-yellow';
                    grade = 'B';
                } else if (percentage >= 55) {
                    bgClass = 'bg-orange';
                    grade = 'C';
                } else {
                    bgClass = 'bg-red';
                    grade = 'F';
                }

                const row = document.createElement('tr');
                row.className = bgClass;
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${student.name}</td>
                    <td>${student.rollNo}</td>
                    <td>${student.marks.CNN}</td>
                    <td>${student.marks.CPP}</td>
                    <td>${student.marks.ADE}</td>
                    <td>${student.marks.DSA}</td>
                    <td><strong>${total}</strong></td>
                    <td><strong>${percentage.toFixed(2)}%</strong></td>
                    <td><strong>${grade}</strong></td>
                    <td>
                        <button class="btn btn-edit" onclick="editStudent(${index})">Edit</button>
                        <button class="btn btn-delete" onclick="deleteStudent(${index})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            // Re-apply filter if one is active after re-rendering
            if (typeof filterTable === 'function') filterTable();
        }

        function deleteStudent(index) {
            if(confirm('Are you sure you want to delete this record?')) {
                students.splice(index, 1);
                renderTable(); // Re-render table after deletion
            }
        }

        function editStudent(index) {
            const student = students[index];
            
            const newName = prompt("Enter new name:", student.name);
            if (newName !== null && newName.trim() !== "") {
                student.name = newName.trim();
            }

            const subjects = ['CNN', 'CPP', 'ADE', 'DSA'];
            for (let sub of subjects) {
                const newMark = prompt(`Enter new marks for ${sub} (0-100):`, student.marks[sub]);
                if (newMark !== null && !isNaN(newMark) && newMark.trim() !== "") {
                    // Constrain the marks between 0 and 100
                    let parsedMark = Number(newMark);
                    if(parsedMark >= 0 && parsedMark <= 100) {
                        student.marks[sub] = parsedMark;
                    } else {
                        alert(`Invalid mark for ${sub}. Must be between 0 and 100.`);
                    }
                }
            }
            
            renderTable(); // Re-render table to reflect edits
        }

        function filterTable() {
            const filterInput = document.getElementById('filterInput');
            if (!filterInput) return;
            
            const filter = filterInput.value.toLowerCase();
            const rows = document.getElementById('tableBody').getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const nameCell = rows[i].getElementsByTagName('td')[1];
                const rollCell = rows[i].getElementsByTagName('td')[2];
                if (nameCell || rollCell) {
                    const nameText = nameCell.textContent || nameCell.innerText;
                    const rollText = rollCell.textContent || rollCell.innerText;
                    if (nameText.toLowerCase().includes(filter) || rollText.toLowerCase().includes(filter)) {
                        rows[i].style.display = '';
                    } else {
                        rows[i].style.display = 'none';
                    }
                }
            }
        }

        // Initial render when the page loads
        renderTable();
    </script>
</body>
</html>
