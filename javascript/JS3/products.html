<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Product List</h2>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="p-name" placeholder="Product Name">
        <input type="text" id="p-url" placeholder="Image URL">
        <input type="text" id="p-price" placeholder="Price">
        <button id="add-btn">Add Product</button>
    </div>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Image</th>
                <th>Product Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="product-body">
            <!-- Product rows will be dynamically inserted here -->
        </tbody>
    </table>
    <script>
        const products = [
            { name: "Laptop", url: "https://thf.bing.com/th/id/OIP.4Kl-BZjggBCdSAbpvE0DtAHaFj?r=0&o=7&cb=thfc1rm=3&rs=1&pid=ImgDetMain&o=7&rm=3", price: "$999" },
            { name: "Smartphone", url: "https://tse2.mm.bing.net/th/id/OIP.C9QVdTKZ-dr4U8KuZ7QwuwHaKj?r=0&cb=thfc1&pid=ImgDet&w=187&h=267&c=7&dpr=1.3&o=7&rm=3", price: "$699" },
            { name: "Headphones", url: "https://c8.alamy.com/comp/D19RY5/vintage-old-headphone-D19RY5.jpg", price: "$199" }
        ];

        const tableBody = document.getElementById("product-body");
        
        // Function to render the table dynamically
        function renderTable() {
            let rows = "";
            products.forEach(product => {
                rows += `<tr>
                    <td><img src="${product.url}" alt="${product.name}" height="200" width="300"></td>
                    <td>${product.name}</td>
                    <td>${product.price}</td>
                </tr>`;
            });
            tableBody.innerHTML = rows;
        }

        // Initial render when page loads
        renderTable();

        // Listen for "Add Product" button click
        document.getElementById("add-btn").addEventListener("click", () => {
            let nameInput = document.getElementById("p-name");
            let urlInput = document.getElementById("p-url");
            let priceInput = document.getElementById("p-price");

            if(nameInput.value !== "" && urlInput.value !== "" && priceInput.value !== "") {
                products.push({ name: nameInput.value, url: urlInput.value, price: priceInput.value });
                renderTable(); // Re-render table with the new data
                
                // Clear input fields after adding
                nameInput.value = "";
                urlInput.value = "";
                priceInput.value = "";
            } else {
                alert("Please fill all the fields!");
            }
        });
    </script>
</body>
</html>
