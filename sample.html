<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Photo Collage</title>
    <link rel="icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmu16XGLFRYfvlW9H4TbGR_qfzbtxa_2lkkg&s">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        header {
            text-align: center;
            padding: 3rem 1rem;
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaaaaa;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .collage-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-auto-rows: 250px;
            grid-auto-flow: dense;
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .collage-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .collage-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255,107,107,0.3);
            z-index: 1;
        }
        .collage-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .collage-item:hover img {
            transform: scale(1.1);
        }
        /* Special classes for different sizes to create the collage effect */
        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }
        .large { grid-column: span 2; grid-row: span 2; }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .wide, .tall, .large {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Gallery</h1>
        <p>A beautifully curated photo collage</p>
    </header>
    <div class="collage-container">
        <div class="collage-item large"><img src="https://picsum.photos/800/800?random=1" alt="Collage Image 1"></div>
        <div class="collage-item"><img src="https://picsum.photos/400/400?random=2" alt="Collage Image 2"></div>
        <div class="collage-item tall"><img src="https://picsum.photos/400/800?random=3" alt="Collage Image 3"></div>
        <div class="collage-item"><img src="https://picsum.photos/400/400?random=4" alt="Collage Image 4"></div>
        <div class="collage-item wide"><img src="https://picsum.photos/800/400?random=5" alt="Collage Image 5"></div>
        <div class="collage-item"><img src="https://picsum.photos/400/400?random=6" alt="Collage Image 6"></div>
        <div class="collage-item"><img src="https://picsum.photos/400/400?random=7" alt="Collage Image 7"></div>
    </div>
</body>
</html>
