<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Attribute Selectors</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            font-weight: 500;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Attribute selector: selects img elements with an alt attribute that STARTS WITH "A" */
        img[alt^="A"] {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #8a2be2; /* blueviolet */
            transition: transform 0.3s ease;
        }

        img[alt^="A"]:hover {
            transform: scale(1.1);
        }

        /* Attribute selector: selects h1 elements with an id attribute that ENDS WITH "tag" */
        h1[id$="tag"] {
            color: #e91e63; /* Pink */
        }

        /* Attribute selector: selects h1 elements with an id attribute that is "heading" or starts with "heading-" */
        h1[id|="heading"] {
            color: #4caf50; /* Green */
        }

        /* Attribute selector: selects h1 elements with an id attribute that CONTAINS "find" (replaces the overly broad [id*="h"]) */
        h1[id*="find"] {
            color: #2196f3; /* Blue */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS Attribute Selectors Demo</h1>
        <h1 id="heading">This is green (id|=heading)</h1>
        <h1 id="main-heading-tag">This is pink (id$="tag")</h1>
        <h1 id="find_this">This is blue (id*="find")</h1>
        <h1 id="heading-other">This is also green (id|="heading")</h1>
        <div class="images">
            <img src="https://www.w3schools.com/css/img_avatar.png" alt="Avatar" class="avatar">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s" alt="Another Avatar" class="avatar">
        </div>
    </div>
</body>
</html>
