<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 li:first-of-type {
            color: #e91e63; /* Pink for the first item */
        }
        li:nth-child(2) {
            color: #9c27b0; /* Purple for the second item */
        }
        li:nth-child(3) {
            color: #ffeb3b; /* Yellow for the third item */
        }
        li:nth-child(4) {
            color: #00bcd4; /* Cyan for the fourth item */
        }
        li:nth-child(5) {
            color: #e91e63; /* Pink for the fifth item */
        }
        li:nth-child(6) {
            color: #9c27b0; /* Purple for the sixth item */
        }
        li:nth-child(7) {
            color: #ffeb3b; /* Yellow for the seventh item */
        }
        li:nth-child(8) {
            color: #00bcd4; /* Cyan for the eighth item */
        }
button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #34495e;
        }
        button:active {
            background-color: #2c3e50;
        }
button:first-child {
            background-color: #e91e63; /* Pink for the first item */
        }
        button:nth-child(2) {
            background-color: #9c27b0; /* Purple for the second item */
        }
        button:nth-child(3) {
            background-color: #ffeb3b; /* Yellow for the third item */
        }
        button:nth-child(4) {
            background-color: #00bcd4; /* Cyan for the fourth item */
        }
        button:nth-child(5) {
            background-color: #e91e63; /* Pink for the fifth item */
        }
        button:nth-child(6) {
            background-color: #9c27b0; /* Purple for the sixth item */
        }
        button:nth-child(7) {
            background-color: #ffeb3b; /* Yellow for the seventh item */
        }
        button:nth-child(8) {
            background-color: #00bcd4; /* Cyan for the eighth item */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            /* Replaced background image with a fading, mixing neo-color gradient */
            background: linear-gradient(45deg, #00bcd4, #e91e63, #9c27b0, #ffeb3b); /* Neo colors: Cyan, Pink, Purple, Yellow */
            background-size: 400% 400%; /* Larger background size for animation */
            animation: gradientAnimation 15s ease infinite; /* Animation for fading and mixing */
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 10px;
        }
</style>
<body>
    <h1>Top 7 Formula 1 Drivers of 2024</h1>
    <ol>
        <li>Max verstappen</li>
        <li>Lewis Hamilton</li>
        <li>Sergio Perez</li>
        <li>Charles Leclerc</li>
        <li>Lando Norris</li>
        <li>Carlos Sainz</li>
        <li>Sebastian Vettel</li>  
    </ol>
    <h1>Race tracks</h1>
    <div>
        <button>Monaco Grand Prix</button>
        <button>Silverstone Circuit</button>
        <button>Monza Circuit</button>
        <button>Marina Bay Street Circuit</button>
        <button>Red Bull Ring</button>
        <button>Yas Marina Circuit</button>
        <button>Interlagos Circuit</button>
        <button>Hungaroring</button>
    </div>
</body>
</html>
