<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f4f4f4;
        }
        
        /* Responsive Grid Layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .gallery img:hover {
            transform: scale(1.03);
        }

        /* Modal Overlay */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <img src="https://picsum.photos/id/1011/400/300" alt="Image 1">
        <img src="https://picsum.photos/id/1015/400/300" alt="Image 2">
        <img src="https://picsum.photos/id/1018/400/300" alt="Image 3">
        <img src="https://picsum.photos/id/1022/400/300" alt="Image 4">
        <img src="https://picsum.photos/id/1025/400/300" alt="Image 5">
        <img src="https://picsum.photos/id/1033/400/300" alt="Image 6">
    </div>

    <div class="modal" id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Enlarged Image" onclick="event.stopPropagation()">
    </div>

    <script>
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        document.querySelectorAll('.gallery img').forEach(img => {
            img.addEventListener('click', () => {
                modalImg.src = img.src;
                modal.style.display = 'flex';
            });
        });
    </script>
</body>
</html>
