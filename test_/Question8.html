<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
        }
        .card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 4px; 
        }
        .name { 
            font-weight: bold; 
            font-size: 1.1em; 
        }
        .email { 
            color: #666; 
            font-size: 0.9em; 
        }
    </style>
</head>
<body>
    <h2>User List</h2>
    <div id="loading">Loading data, please wait...</div>
    <div id="user-container"></div>

    <script>
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(res => res.json())
            .then(users => {
                document.getElementById('loading').style.display = 'none'; // Hide loading text
                const container = document.getElementById('user-container');
                
                users.forEach(user => {
                    container.innerHTML += `<div class="card"><div class="name">${user.name}</div><div class="email">${user.email}</div></div>`;
                });
            })
            .catch(() => document.getElementById('loading').textContent = 'Error loading data.');
    </script>
</body>
</html>
